<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta author="Thailis Gonzalez">
    <meta name="description" content="A website to access knowledge about our ancestors and their culture">
    <link rel="stylesheet" href="css/style.css">
    <script src="js/confirmation.js" type="module"></script>
    <title>Confirmation Page</title>
</head>

<body>
    <header class="divider" id="main-header"></header>
    <main>
        <section class="confirmation">

            <h1>Thank You for Contacting Us!</h1>

            <p class="confirmation-text">
                Your message was sent successfully. We will respond as soon as possible.
            </p>

            <ul class="confirmation-data">
                <li><strong>First Name:</strong> <span id="firstName"></span></li>
                <li><strong>Last Name:</strong> <span id="lastName"></span></li>
                <li><strong>Email:</strong> <span id="email"></span></li>
                <li><strong>Message Type:</strong> <span id="messageType"></span></li>
                <li><strong>Message:</strong> <span id="message"></span></li>
            </ul>

            <p>
                <strong>Submitted:</strong>
                <span id="timestamp"></span>
            </p>

            <div class="submission-info"></div>

            <a href="index.html" class="back-home">Return Home</a>

        </section>
    </main>

    <footer id="main-footer"></footer>
</body>

</html>
