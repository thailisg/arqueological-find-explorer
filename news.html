<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta author="Thailis Gonzalez">
    <meta name="description" content="A website to access knowledge about our ancestors and their culture">
    <link rel="stylesheet" href="css/style.css">
    <script type="module" src="js/news.js"></script>
    <title>News Page</title>
</head>

<body>
    <header class="divider" id="main-header"></header>

    <main class="main-news">
        <!-- filter section -->
        <section class="filters">

            <h2 class="filters-title">Filter News</h2>

            <div class="filters-content">
                <!-- filter by letter -->
                <div class="filter-group">
                    <label for="letterFilter">Search by letter:</label>
                    <input type="text" id="letterFilter" maxlength="1" placeholder="A-Z">
                </div>

                <div class="fact-zone" data-fact>.</div>
                <!-- sort by date -->
                <div class="filter-group">
                    <label for="sortDate">Sort by date:</label>
                    <select id="sortDate">
                        <option value="newest">Newest</option>
                        <option value="oldest">Oldest</option>
                    </select>
                </div>

                <div class="fact-zone" data-fact>.</div>
                <!-- region filter, placeholder for now -->
                <div class="filter-group">
                    <label for="regionFilter">Region:</label>
                    <input type="text" id="regionFilter" placeholder="e.g. Peru, Egypt">
                </div>

            </div>

        </section>

        <!-- featured -->
        <section class="featured">
            <h2>Featured Discoveries</h2>
            <div class="featured-container"></div>
        </section>

        <!-- news list -->
        <section class="news-section news-page"></section>

    </main>
    <footer id="main-footer"></footer>
</body>

</html>
